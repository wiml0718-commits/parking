<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>車位通 · 全台即時停車搜尋</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#0B2A4A;       /* 停車告示牌深藍 */
    --ink-soft:#1C3F66;
    --green:#15A35A;     /* 充足 */
    --amber:#E29A12;     /* 緊張 */
    --red:#D6392E;       /* 將滿 / 額滿 */
    --paper:#EEF1F0;
    --card:#FFFFFF;
    --line:#E3E7E6;
    --muted:#6B7785;
    --shadow:0 6px 24px rgba(11,42,74,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);color:var(--ink);overflow:hidden;
  }
  #map{position:fixed;inset:0;z-index:0;background:#dfe5e4;}

  /* ---------- 頂部列 ---------- */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:600;
    padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;
    background:linear-gradient(180deg,rgba(238,241,240,.96) 60%,rgba(238,241,240,0));
    pointer-events:none;
  }
  .topbar > *{pointer-events:auto;}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
  .pmark{
    width:30px;height:30px;border-radius:8px;background:var(--ink);
    color:#fff;font-weight:800;font-size:19px;display:grid;place-items:center;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:16px;margin:0;font-weight:800;letter-spacing:.5px;}
  .brand .area{
    margin-left:auto;font-size:12.5px;font-weight:700;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:999px;
    padding:6px 12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;
  }
  .area .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  #citySel{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:700;
    color:var(--ink);padding:0 2px;max-width:38vw;cursor:pointer;
    -webkit-appearance:none;appearance:none;}
  .radius{
    display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:3px;box-shadow:var(--shadow);width:fit-content;
  }
  .radius button{
    border:0;background:transparent;font:inherit;font-size:13px;font-weight:700;
    color:var(--muted);padding:6px 14px;border-radius:9px;cursor:pointer;transition:.15s;
  }
  .radius button.on{background:var(--ink);color:#fff;}

  /* ---------- 地點搜尋框 ---------- */
  .searchbar{
    display:flex;align-items:center;gap:8px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    padding:9px 12px;margin-bottom:9px;
  }
  .searchbar .sicon{width:18px;height:18px;color:var(--muted);flex:none;}
  #placeInput{border:0;outline:0;background:transparent;font:inherit;font-size:14px;
    color:var(--ink);flex:1;min-width:0;}
  #placeClear{border:0;background:transparent;color:var(--muted);font-size:15px;
    cursor:pointer;display:none;padding:2px 4px;flex:none;}
  #placeClear.show{display:block;}

  /* ---------- 浮動定位鈕 ---------- */
  .locate{
    position:fixed;right:14px;z-index:600;bottom:calc(42vh + 14px);
    width:46px;height:46px;border-radius:14px;border:1px solid var(--line);
    background:var(--card);box-shadow:var(--shadow);display:grid;place-items:center;
    cursor:pointer;transition:bottom .28s cubic-bezier(.4,0,.2,1);
  }
  .locate svg{width:22px;height:22px;stroke:var(--ink);}
  .locate.up{bottom:calc(82vh + 14px);}

  /* ---------- 底部清單抽屜 ---------- */
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:600;
    height:42vh;background:var(--card);border-radius:20px 20px 0 0;
    box-shadow:0 -8px 28px rgba(11,42,74,.16);
    display:flex;flex-direction:column;
    transition:height .28s cubic-bezier(.4,0,.2,1);
  }
  .sheet.open{height:82vh;}
  .grab{padding:9px 0 4px;display:flex;justify-content:center;cursor:pointer;flex:none;}
  .grab span{width:38px;height:5px;border-radius:3px;background:#CBD2D1;}
  .sheet-head{
    flex:none;padding:2px 16px 12px;display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--line);
  }
  .sheet-head .count{font-size:15px;font-weight:800;}
  .sheet-head .count b{color:var(--ink);}
  .research{
    margin-left:auto;border:0;background:var(--ink);color:#fff;font:inherit;font-weight:700;
    font-size:13px;padding:8px 14px;border-radius:10px;cursor:pointer;display:flex;gap:6px;align-items:center;
  }
  .research:active{transform:scale(.97);}
  .legend{display:flex;gap:14px;padding:9px 16px 4px;flex:none;}
  .legend i{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);font-weight:600;font-style:normal;}
  .legend i::before{content:"";width:9px;height:9px;border-radius:50%;}
  .legend .g::before{background:var(--green);}
  .legend .a::before{background:var(--amber);}
  .legend .r::before{background:var(--red);}
  .dtime{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap;}
  .dtime b{color:var(--ink);}
  .dtime:active{opacity:.6;}

  .list{overflow-y:auto;flex:1;padding:4px 12px calc(env(safe-area-inset-bottom) + 16px);-webkit-overflow-scrolling:touch;}
  .row{
    display:flex;align-items:center;gap:13px;padding:13px 8px;border-bottom:1px solid var(--line);cursor:pointer;
  }
  .row:active{background:#F5F7F6;}
  .row.sel{background:#F0F5FF;border-radius:12px;border-bottom-color:transparent;}
  .badge{
    flex:none;width:58px;height:58px;border-radius:13px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#fff;line-height:1;
    font-variant-numeric:tabular-nums;box-shadow:inset 0 0 0 2px rgba(255,255,255,.18);
  }
  .badge .lbl{font-size:9px;font-weight:700;opacity:.85;margin-bottom:2px;letter-spacing:1px;}
  .badge .num{font-size:23px;font-weight:800;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  .badge.full .num{font-size:15px;}
  .b-green{background:var(--green);}
  .b-amber{background:var(--amber);}
  .b-red{background:var(--red);}
  .info{flex:1;min-width:0;}
  .info .nm{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .info .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
  .info .meta .tag{background:var(--paper);border-radius:6px;padding:1px 7px;font-weight:600;}
  .dist{flex:none;text-align:right;}
  .dist .km{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;}
  .dist .nav{
    margin-top:5px;font-size:12px;font-weight:700;color:#fff;background:var(--ink);
    border-radius:8px;padding:5px 11px;display:inline-block;text-decoration:none;
  }
  .empty{text-align:center;color:var(--muted);padding:40px 24px;font-size:14px;line-height:1.6;}

  /* ---------- 地圖標記 ---------- */
  .pin{position:relative;}
  .pin .cap{
    width:38px;height:38px;border-radius:50% 50% 50% 4px;transform:rotate(45deg);
    display:grid;place-items:center;box-shadow:0 3px 8px rgba(11,42,74,.35);
    border:2px solid #fff;
  }
  .pin .cap span{transform:rotate(-45deg);color:#fff;font-weight:800;font-size:13px;
    font-family:ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums;}
  .pin.full .cap span{font-size:10px;}
  .pin.sel{z-index:1000;}
  .pin.sel .cap{animation:pop .5s ease;width:44px;height:44px;}
  @keyframes pop{0%{transform:rotate(45deg) scale(.7);}60%{transform:rotate(45deg) scale(1.12);}100%{transform:rotate(45deg) scale(1);}}
  .p-green .cap{background:var(--green);}
  .p-amber .cap{background:var(--amber);}
  .p-red .cap{background:var(--red);}

  .me{width:18px;height:18px;border-radius:50%;background:#2C7BE5;border:3px solid #fff;box-shadow:0 0 0 6px rgba(44,123,229,.22),0 1px 4px rgba(0,0,0,.3);}
  .placepin{width:22px;height:22px;border-radius:50% 50% 50% 4px;transform:rotate(45deg);
    background:#7A4FD0;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);}

  .toast{
    position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 96px);transform:translateX(-50%);
    z-index:900;background:var(--ink);color:#fff;font-size:13px;font-weight:600;
    padding:10px 16px;border-radius:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;max-width:88vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  .leaflet-control-attribution{font-size:9px;}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <div class="pmark">P</div>
    <h1>車位通</h1>
    <div class="area"><span class="dot"></span><select id="citySel" aria-label="選擇縣市"></select></div>
  </div>
  <div class="searchbar">
    <svg class="sicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="placeInput" type="search" enterkeyhint="search" placeholder="搜尋地點，例如：台中車站、新光三越" autocomplete="off">
    <button id="placeClear" aria-label="清除">✕</button>
  </div>
  <div class="radius" id="radius">
    <button data-r="500">500 m</button>
    <button data-r="1000" class="on">1 km</button>
    <button data-r="2000">2 km</button>
  </div>
</div>

<button class="locate" id="locate" aria-label="回到我的位置">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <circle cx="12" cy="12" r="8.5"/></svg>
</button>

<div class="sheet" id="sheet">
  <div class="grab" id="grab"><span></span></div>
  <div class="sheet-head">
    <div class="count">附近 <b id="cnt">0</b> 處停車</div>
    <button class="research" id="research">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg>
      搜尋此區域
    </button>
  </div>
  <div class="legend">
    <i class="g">車位充足</i><i class="a">車位緊張</i><i class="r">即將滿位</i>
    <span class="dtime" id="dataTime"></span>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ============================================================
   車位通 — 手機版即時停車搜尋原型
   目前使用「模擬資料」。要接真實全台資料時，只需把下方
   fetchParkingData() 換成呼叫 TDX 停車 API 即可，其餘不動。
   ============================================================ */

const TAIWAN_CITIES = [
  {n:'台北市',la:25.0375,lo:121.5637},{n:'新北市',la:25.0169,lo:121.4628},
  {n:'基隆市',la:25.1276,lo:121.7392},{n:'桃園市',la:24.9936,lo:121.3010},
  {n:'新竹市',la:24.8039,lo:120.9647},{n:'新竹縣',la:24.8387,lo:121.0177},
  {n:'苗栗縣',la:24.5602,lo:120.8214},{n:'台中市',la:24.1477,lo:120.6736},
  {n:'彰化縣',la:24.0809,lo:120.5385},{n:'南投縣',la:23.9609,lo:120.9719},
  {n:'雲林縣',la:23.7092,lo:120.4313},{n:'嘉義市',la:23.4801,lo:120.4491},
  {n:'嘉義縣',la:23.4518,lo:120.2555},{n:'台南市',la:22.9999,lo:120.2270},
  {n:'高雄市',la:22.6273,lo:120.3014},{n:'屏東縣',la:22.5519,lo:120.5487},
  {n:'宜蘭縣',la:24.7021,lo:121.7378},{n:'花蓮縣',la:23.9871,lo:121.6015},
  {n:'台東縣',la:22.7583,lo:121.1444},{n:'澎湖縣',la:23.5712,lo:119.5793},
  {n:'金門縣',la:24.4321,lo:118.3171},{n:'連江縣',la:26.1608,lo:119.9512}
];

const FALLBACK = {n:'台中市', la:24.1477, lo:120.6736}; // 預設城市（台中市）

/* ---- 工具 ---- */
function haversine(a,b,c,d){
  const R=6371000,t=Math.PI/180;
  const x=Math.sin((c-a)*t/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin((d-b)*t/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function nearestCity(la,lo){
  let best=TAIWAN_CITIES[0],bd=1e12;
  for(const c of TAIWAN_CITIES){const dd=haversine(la,lo,c.la,c.lo);if(dd<bd){bd=dd;best=c;}}
  return best.n;
}
function fmtDist(m){return m<1000?Math.round(m)+' m':(m/1000).toFixed(1)+' km';}
function level(a,t){const r=t?a/t:0;if(a<=0)return'red';if(r<0.08)return'red';if(r<0.25)return'amber';return'green';}

/* ============================================================
   資料層 —— 換成 TDX 時改這裡
   真實版大致長這樣：
     const token = await getTdxToken(id, secret);
     const url = `https://tdx.transportdata.tw/api/basic/v1/Parking/OffStreet/...`;
     const res = await fetch(url,{headers:{authorization:'Bearer '+token}});
   然後把回傳欄位對應成 {id,name,lat,lng,total,available,type,fee,ev}
   ============================================================ */
// ★ 部署好 tdx-proxy.js 後，把網址填進來，就會改用真實全台資料。
//   留空字串時，仍使用下方模擬資料，方便先看畫面。
const CONFIG = { PROXY_URL: 'https://parking-lzbf.onrender.com/api/parking' };
let lastDataTime=null;             // 後端動態車位的更新時間（給「更新於 X 分鐘前」用）
let lastMeta={hasStatic:true, cityTotal:0};  // 區分「沒這縣市」/「暫時無回報」/「位置問題」

async function fetchParkingData(la,lo,radius,fresh){
  if(!CONFIG.PROXY_URL){ lastDataTime=Date.now(); const m=await mockParkingData(la,lo,radius); lastMeta={hasStatic:true,cityTotal:m.length}; return m; }
  try{
    const u=`${CONFIG.PROXY_URL}?lat=${la}&lng=${lo}&radius=${radius}${fresh?'&fresh=1':''}`;
    const r=await fetch(u);
    if(!r.ok) throw new Error('proxy '+r.status);
    const data=await r.json();           // { lots:[...], dataTime, city, hasStatic, cityTotal }
    lastDataTime = data.dataTime || Date.now();
    lastMeta = { hasStatic: data.hasStatic!==false, cityTotal: data.cityTotal||0 };
    return Array.isArray(data)?data:(data.lots||[]);
  }catch(e){
    console.error('TDX 讀取失敗，暫時改用模擬資料：',e);
    toast('即時資料讀取失敗，顯示模擬資料');
    lastDataTime=Date.now();
    const m=await mockParkingData(la,lo,radius); lastMeta={hasStatic:true,cityTotal:m.length}; return m;
  }
}

/* ---- 模擬資料（demo 用，接上 TDX 後可刪） ---- */
const N1=['市府','信義','站前','中山','大安','文化','體育','河濱','光復','民生','復興','成功','中正','和平','自由','幸福'];
const N2=['轉運站','商圈地下','公有平面','立體','公園地下','路口','行政中心','棒球場','綠地','傳統市場'];
async function mockParkingData(la,lo,radius){
  const out=[];const num=8+Math.floor(Math.random()*7);
  for(let i=0;i<num;i++){
    const ang=Math.random()*Math.PI*2, dist=Math.random()*radius;
    const dla=la+(dist*Math.cos(ang))/111000;
    const dlo=lo+(dist*Math.sin(ang))/(111000*Math.cos(la*Math.PI/180));
    const roadside=Math.random()<0.35;
    const total=roadside?20+Math.floor(Math.random()*90):120+Math.floor(Math.random()*480);
    let avail=Math.floor(Math.random()**1.7*total);
    if(Math.random()<0.12)avail=0;
    const ev=!roadside&&Math.random()<0.5?2+Math.floor(Math.random()*10):0;
    out.push({
      id:'p'+i,
      name:N1[Math.floor(Math.random()*N1.length)]+(roadside?'路停車格':N2[Math.floor(Math.random()*N2.length)]+'停車場'),
      lat:dla,lng:dlo,total,available:avail,
      type:roadside?'路邊':'路外',
      fee:roadside?'每小時 $20':'每小時 $'+(20+10*Math.floor(Math.random()*4)),
      ev
    });
  }
  // 模擬網路延遲
  await new Promise(r=>setTimeout(r,260));
  return out;
}

/* ---- 地圖 ---- */
const map=L.map('map',{zoomControl:false,attributionControl:true}).setView([FALLBACK.la,FALLBACK.lo],15);
/* 底圖：內政部國土測繪中心 臺灣通用電子地圖（免金鑰、免申請）
   其他可用圖層代碼，只要改網址中的 EMAP 即可：
     EMAP    臺灣通用電子地圖（預設）
     EMAP01  灰階版（適合讓彩色標記更跳）
     PHOTO2  正射影像 / 航照（衛星圖感）
   想換回 OpenStreetMap 也只要換成 OSM 那行。 */
L.tileLayer('https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}',{
  maxZoom:20,maxNativeZoom:19,
  attribution:'圖資：<a href="https://maps.nlsc.gov.tw/" target="_blank" rel="noopener">國土測繪中心</a>'
}).addTo(map);

let meMarker=null, lotMarkers={}, lots=[], selId=null, radius=1000, center={la:FALLBACK.la,lo:FALLBACK.lo};

function badgeClass(lv){return lv==='green'?'b-green':lv==='amber'?'b-amber':'b-red';}
function pinClass(lv){return lv==='green'?'p-green':lv==='amber'?'p-amber':'p-red';}

function makeIcon(lot,sel){
  const lv=level(lot.available,lot.total);
  const full=lot.available<=0;
  const txt=full?'滿':lot.available;
  return L.divIcon({
    className:'',iconSize:[38,38],iconAnchor:[19,38],
    html:`<div class="pin ${pinClass(lv)} ${full?'full':''} ${sel?'sel':''}"><div class="cap"><span>${txt}</span></div></div>`
  });
}

function renderMap(){
  Object.values(lotMarkers).forEach(m=>map.removeLayer(m));
  lotMarkers={};
  lots.forEach(lot=>{
    const m=L.marker([lot.lat,lot.lng],{icon:makeIcon(lot,lot.id===selId)}).addTo(map);
    m.on('click',()=>select(lot.id,true));
    lotMarkers[lot.id]=m;
  });
}

function renderList(){
  const el=document.getElementById('list');
  document.getElementById('cnt').textContent=lots.length;
  if(!lots.length){
    const cn=nearestCity(center.la,center.lo);
    let msg;
    if(!lastMeta.hasStatic){
      // 該縣市連停車場清單都沒有 → 政府未提供
      msg=`<b>${cn}</b>目前未提供即時車位資料。<br><br>並非每個縣市都有開放即時停車資料，這與 App 無關，而是該縣市政府尚未提供。<br><br>資料較完整的縣市以雙北、桃園、台中、台南等為主，可從左上角切換縣市試試。`;
    } else if(lastMeta.cityTotal>0){
      // 縣市有即時資料，只是你附近這個範圍沒有 → 位置問題
      msg=`這個範圍內目前沒有車位回報。<br><br>試試上方放大到 <b>2 km</b>，或移動地圖到市區後按「搜尋此區域」。`;
    } else {
      // 有停車場清單、但動態全空 → 來源暫時無回報
      msg=`<b>${cn}</b>目前無即時車位回報。<br><br>可能是資料來源暫時無回應，稍待一會兒再按右邊的「<b>立即更新</b>」通常就會恢復。`;
    }
    el.innerHTML=`<div class="empty">${msg}</div>`;
    return;
  }
  const sorted=[...lots].sort((a,b)=>a._d-b._d);
  el.innerHTML=sorted.map(lot=>{
    const lv=level(lot.available,lot.total);
    const full=lot.available<=0;
    return `<div class="row ${lot.id===selId?'sel':''}" data-id="${lot.id}">
      <div class="badge ${badgeClass(lv)} ${full?'full':''}">
        <div class="lbl">剩餘</div><div class="num">${full?'滿位':lot.available}</div>
      </div>
      <div class="info">
        <div class="nm">${lot.name}</div>
        <div class="meta">
          <span class="tag">${lot.type}</span>
          <span>${lot.fee}</span>
          ${lot.ev?`<span class="tag">充電 ${lot.ev}</span>`:''}
          <span>共 ${lot.total} 位</span>
        </div>
      </div>
      <div class="dist">
        <div class="km">${fmtDist(lot._d)}</div>
        <a class="nav" href="https://www.google.com/maps/dir/?api=1&destination=${lot.lat},${lot.lng}&travelmode=driving" target="_blank" rel="noopener" onclick="event.stopPropagation()">導航</a>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.row').forEach(r=>r.addEventListener('click',()=>select(r.dataset.id,true)));
}

function select(id,fly){
  const prev=selId;selId=id;
  if(prev&&lots.find(l=>l.id===prev))lotMarkers[prev]?.setIcon(makeIcon(lots.find(l=>l.id===prev),false));
  const lot=lots.find(l=>l.id===id);if(!lot)return;
  lotMarkers[id]?.setIcon(makeIcon(lot,true));
  if(fly)map.panTo([lot.lat,lot.lng],{animate:true});
  renderList();
  const row=document.querySelector(`.row[data-id="${id}"]`);
  if(row)row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function load(la,lo,fresh){
  center={la,lo};
  const cs=document.getElementById('citySel'); if(cs) cs.value=nearestCity(la,lo);
  toast(fresh?'立即更新中…':'搜尋附近車位…');
  lots=await fetchParkingData(la,lo,radius,fresh);
  // 找不到、但這縣市其實有資料 → 自動放大範圍重試一次（讀快取、不額外花額度）
  if(lots.length===0 && radius<3000 && lastMeta.cityTotal>0){
    const wide=await fetchParkingData(la,lo,3000,fresh);
    if(wide.length){ lots=wide; toast('附近較少，已自動擴大搜尋範圍'); }
  }
  lots.forEach(l=>l._d=haversine(la,lo,l.lat,l.lng));
  selId=null;
  renderMap();renderList();updateDataTime();
  if(lots.length) toast('找到 '+lots.length+' 處停車');
}

/* 顯示「更新於 X 分鐘前」，點一下強制更新（只有此時才花 TDX 額度） */
function updateDataTime(){
  const el=document.getElementById('dataTime');
  if(!el) return;
  if(!lastDataTime){el.textContent='';return;}
  const sec=Math.max(0,Math.round((Date.now()-lastDataTime)/1000));
  const ago=sec<60?'剛剛':sec<3600?Math.floor(sec/60)+' 分鐘前':Math.floor(sec/3600)+' 小時前';
  el.innerHTML=`更新於 ${ago} · <b>立即更新</b>`;
}
setInterval(updateDataTime,30000);    // 每 30 秒刷新一次「X 分鐘前」文字（不打 API）

/* ---- 定位 ---- */
function locateMe(){
  toast('定位中…');
  if(!navigator.geolocation){useFallback();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      const la=p.coords.latitude,lo=p.coords.longitude;
      if(meMarker)map.removeLayer(meMarker);
      meMarker=L.marker([la,lo],{icon:L.divIcon({className:'',html:'<div class="me"></div>',iconSize:[18,18],iconAnchor:[9,9]}),zIndexOffset:500}).addTo(map);
      map.setView([la,lo],15);
      load(la,lo);
    },
    ()=>useFallback(),
    {enableHighAccuracy:true,timeout:8000,maximumAge:30000}
  );
}
function useFallback(){
  const sel=document.getElementById('citySel');
  let c=TAIWAN_CITIES.find(x=>x.n===(sel&&sel.value)) || FALLBACK;  // 用目前選的縣市，沒有就用預設
  toast('無法取得定位，顯示 '+c.n);
  map.setView([c.la,c.lo],15);
  load(c.la,c.lo);
}

/* ---- 互動 ---- */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}
document.getElementById('locate').addEventListener('click',locateMe);
document.getElementById('research').addEventListener('click',()=>{
  const c=map.getCenter();load(c.lat,c.lng);
});
document.getElementById('dataTime').addEventListener('click',()=>{
  load(center.la,center.lo,true);     // 強制向 TDX 抓最新（會花一次額度）
});
document.getElementById('radius').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#radius button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');radius=+b.dataset.r;
  load(center.la,center.lo);
});
const sheet=document.getElementById('sheet'),locBtn=document.getElementById('locate');
document.getElementById('grab').addEventListener('click',()=>{
  sheet.classList.toggle('open');
  locBtn.classList.toggle('up',sheet.classList.contains('open'));
});

/* ---- 地點搜尋（Nominatim / OpenStreetMap，免金鑰） ---- */
let placeMarker=null;
async function searchPlace(q){
  q=q.trim();
  if(!q) return;
  toast('搜尋地點…');
  try{
    // 限定台灣、回繁中、取最相關 1 筆
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tw&accept-language=zh-TW&q='+encodeURIComponent(q);
    const r=await fetch(url,{headers:{'Accept':'application/json'}});
    const arr=await r.json();
    if(!arr||!arr.length){ toast('找不到這個地點'); return; }
    const la=parseFloat(arr[0].lat), lo=parseFloat(arr[0].lon);
    // 在地圖標出搜尋的點
    if(placeMarker) map.removeLayer(placeMarker);
    placeMarker=L.marker([la,lo],{icon:L.divIcon({className:'',html:'<div class="placepin"></div>',iconSize:[22,22],iconAnchor:[11,22]}),zIndexOffset:600}).addTo(map);
    map.setView([la,lo],16);
    load(la,lo);              // 載入該點附近停車
  }catch(e){
    console.error(e); toast('地點搜尋失敗，請稍後再試');
  }
}
const placeInput=document.getElementById('placeInput'), placeClear=document.getElementById('placeClear');
placeInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); placeInput.blur(); searchPlace(placeInput.value); }});
placeInput.addEventListener('input',()=>{ placeClear.classList.toggle('show', placeInput.value.length>0); });
placeClear.addEventListener('click',()=>{
  placeInput.value=''; placeClear.classList.remove('show');
  if(placeMarker){ map.removeLayer(placeMarker); placeMarker=null; }
  placeInput.focus();
});

/* ---- 縣市下拉選單 ---- */
const citySel=document.getElementById('citySel');
citySel.innerHTML='<option value="auto">📍 自動定位</option>'+
  TAIWAN_CITIES.map(c=>`<option value="${c.n}">${c.n}</option>`).join('');
citySel.addEventListener('change',()=>{
  const v=citySel.value;
  if(v==='auto'){ locateMe(); return; }
  const c=TAIWAN_CITIES.find(x=>x.n===v);
  if(c){ map.setView([c.la,c.lo],15); load(c.la,c.lo); }
});

/* ---- 啟動：預設顯示台中市（不自動定位；要定位再按瞄準鈕） ---- */
citySel.value=FALLBACK.n;
map.setView([FALLBACK.la,FALLBACK.lo],15);
load(FALLBACK.la,FALLBACK.lo);
</script>
